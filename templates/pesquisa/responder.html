<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<title>Pesquisa de Satisfação - SiEv</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{

    margin:0;
    padding:0;
    background:#F4F6F9;
    font-family:Arial, Helvetica, sans-serif;

}

.card{

    width:650px;
    max-width:90%;
    margin:50px auto;
    background:#FFF;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    padding:40px;

}

.logo{

    text-align:center;
    color:#003F82;

}

.logo h2{

    margin-bottom:5px;

}

.logo p{

    margin-top:0;
    color:#666;

}

.info{

    margin-top:35px;
    line-height:2;

}

.info strong{

    color:#003F82;

}

.avaliacao{

    margin-top:35px;
    text-align:center;

}

.estrelas{

    display:flex;
    justify-content:center;
    flex-direction:row-reverse;
    gap:8px;
    margin-top:20px;

}

.estrelas input{

    display:none;

}

.estrelas label{

    font-size:42px;
    color:#CCC;
    cursor:pointer;
    transition:.2s;

}

.estrelas label:hover,
.estrelas label:hover ~ label,
.estrelas input:checked ~ label{

    color:#FFC107;

}

textarea{

    width:100%;
    margin-top:25px;
    padding:15px;
    border-radius:8px;
    border:1px solid #CCC;
    resize:vertical;
    font-size:15px;
    box-sizing:border-box;

}

.botao{

    text-align:center;
    margin-top:30px;

}

button{

    background:#907C64;
    color:#FFF;
    border:none;
    padding:15px 45px;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;

}

button:hover{

    background:#7A684F;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<h2>POLÍCIA MILITAR DA BAHIA</h2>

<p>Sistema Inteligente de Eventos - SiEv</p>

<h3>Pesquisa de Satisfação</h3>

</div>

<div class="info">

<strong>Nome:</strong>

{{ solicitacao.solicitante }}

<br>

<strong>Evento:</strong>

{{ solicitacao.nome_evento }}

</div>

<form method="POST">

{% csrf_token %}

<div class="avaliacao">

<h3>Como foi sua experiência?</h3>

<div class="estrelas">

<input type="radio" id="5" name="nota" value="5" required>
<label for="5"><i class="fa-solid fa-star"></i></label>

<input type="radio" id="4" name="nota" value="4">
<label for="4"><i class="fa-solid fa-star"></i></label>

<input type="radio" id="3" name="nota" value="3">
<label for="3"><i class="fa-solid fa-star"></i></label>

<input type="radio" id="2" name="nota" value="2">
<label for="2"><i class="fa-solid fa-star"></i></label>

<input type="radio" id="1" name="nota" value="1">
<label for="1"><i class="fa-solid fa-star"></i></label>

</div>

</div>

<textarea
name="comentario"
rows="5"
placeholder="Escreva seu comentário (opcional)..."></textarea>

<div class="botao">

<button type="submit">

ENVIAR AVALIAÇÃO

</button>

</div>

</form>

</div>

</body>

</html>
