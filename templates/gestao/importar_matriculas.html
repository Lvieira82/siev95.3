{% extends "base.html" %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow border-0 rounded-4 mx-auto" style="max-width:600px;">
        <div class="card-body p-4">

            <h2 class="mb-3">📥 Importar Matrículas</h2>

            <p>
                Envie uma planilha Excel no formato:
            </p>

            <table class="table table-bordered">
                <tr>
                    <th>Matrícula</th>
                    <th>Nome</th>
                    <th>Posto</th>
                    <th>Unidade</th>
                </tr>
            </table>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <input type="file"
                       name="arquivo"
                       accept=".xlsx"
                       class="form-control mb-3"
                       required>

                <button type="submit" class="btn btn-primary w-100">
                    Importar Matrículas
                </button>
            </form>

            <hr>

            <a href="{% url 'painel_gestao' %}" class="btn btn-secondary">
                ← Voltar ao Painel
            </a>

        </div>
    </div>
</div>

{% endblock %}
