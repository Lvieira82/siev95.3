
{% block content %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login da Gestão - SiEv</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #907C64
    );

    padding:20px;
}

.login-container{

    width:100%;
    max-width:420px;

    background:#ffffff;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);

    text-align:center;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#111827;
    margin-bottom:10px;
}

.subtitulo{
    color:#64748b;
    margin-bottom:35px;
}

h2{
    color:#907C64;
    margin-bottom:30px;
}
.btn-voltar{
    display:inline-block;
    padding:12px 26px;
    background:#6b7280;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    transition:.25s;
}

.btn-voltar:hover{
    background:#4b5563;
    transform:translateY(-2px);
}        
input{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:1px solid #cbd5e1;

    border-radius:10px;

    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#111827;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#907C64;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    background:#111827;
}

.voltar{

    display:inline-block;

    margin-top:20px;

    text-decoration:none;

    color:#334155;
}
.area-voltar {
    display: flex;
    justify-content: center;
    margin-top: 25px;
}
        
.btn-voltar {
    display: inline-block;
    background: #6f7786;
    color: white;
    text-decoration: none;
    font-weight: bold;
    padding: 12px 25px;
    border-radius: 9px;
    transition: 0.2s;
}
        
.btn-voltar:hover {
    background: #596170;
    color: white;
}
.rodape{

    margin-top:25px;

    color:#94a3b8;

    font-size:12px;
}


@media(max-width:480px){

    .login-container{
        padding:25px;
    }

    .logo{
        font-size:45px;
    }

    h2{
        font-size:24px;
    }

}

</style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        SiEv
    </div>

    <div class="subtitulo">
        Sistema para Informação de Eventos
    </div>

    <h2>Área Restrita da Gestão</h2>

    <form method="post">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Usuário"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Entrar
        </button>
            {% if erro %}
            <div style="color:red; margin-bottom:15px;">
                {{ erro }}
            </div>
            {% endif %}
    </form>
    <div class="area-voltar">
        <a href="{% url 'home' %}" class="btn-voltar">
            ← Voltar
        </a>
    </div>


    <div class="rodape">
        © 95ª CIPM • Sistema para Informação de Eventos
    </div>

</div>

</body>
</html>

{% endblock %}
