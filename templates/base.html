<!DOCTYPE html>
<html lang="pt-br">
<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}SiEv{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f1f3f6;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        .menu{
            background:#907C64;
            display:flex;
            justify-content:center;
            gap:35px;
            padding:18px;
            flex-wrap:wrap;
        }

        .menu a{
            color:white;
            text-decoration:none;
            font-weight:bold;
            font-size:16px;
            padding:10px 16px;
            border-radius:8px;
            transition:.3s;
        }

        .menu a:hover{
            background:#f2c94c;
            color:#1f3f8f;
        }

        .container{
            width:95%;
            max-width:1200px;
            margin:55px auto;
            flex:1;
        }

        .btn{
            display:inline-block;
            padding:14px 26px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
            color:white;
        }

        .btn-primary{
            background:#907C64;
        }

        .btn-success{
            background:#907C64;
        }

        .btn-dark{
            background:#111827;
        }

        footer{
            background:#907C64;
            color:white;
            text-align:center;
            padding:18px;
        }

        @media(max-width:768px){
            .menu{
                gap:8px;
            }

            .menu a{
                font-size:14px;
                padding:8px 10px;
            }

            .container{
                margin:25px auto;
            }
        }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<body>

<nav class="menu">
    <a href="/">Início</a>
    <a href="/nova/">Nova Informação</a>
    <a href="/consultar/">Consultar</a>
    <a href="/gestao/">Gestão</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 95ª CIPM • Sistema para Informações de Eventos
</footer>

</body>
</html>
